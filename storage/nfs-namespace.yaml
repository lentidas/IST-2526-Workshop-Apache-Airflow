apiVersion: v1
kind: Namespace
metadata:
  name: nfs-storage
  labels:
    # NFS-Ganesha runs with added Linux capabilities (DAC_READ_SEARCH, SYS_RESOURCE), which Talos' Pod Security 
    # Admission only permits in a privileged namespace.
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
