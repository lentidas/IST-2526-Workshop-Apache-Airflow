# Machine configuration to add basic storage and metrics add-ons to the Talos K8s cluster at startup.
---
cluster:
  # Install the helm-controller with its cluster-scoped manifest. This allows us to install other Helm charts 
  # (such as the NFS server and metrics-server) by just creating HelmChart resources, without needing to run 
  # `helm install` manually or to template the charts into our machine config.
  extraManifests:
    - https://github.com/k3s-io/helm-controller/releases/download/v0.17.2/deploy-cluster-scoped.yaml

  inlineManifests:
    # Install local-path-provisioner (default StorageClass for RWO volumes).
    # Based on official example manifest: https://github.com/rancher/local-path-provisioner/blob/master/deploy/local-path-storage.yaml
    # Only modifications from the original are:
    # - Added `pod-security.kubernetes.io/*: privileged` labels to the namespace so the provisioner can run with the 
    #   needed capabilities on Talos.
    # - Changed the path the provisioner uses on the host to `/var/local-path-provisioner`, instead of 
    #   `/opt/local-path-provisioner`.
    - name: local-path-provisioner
      contents: |-
        apiVersion: v1
        kind: Namespace
        metadata:
          name: local-path-storage
          labels:
            pod-security.kubernetes.io/enforce: privileged
            pod-security.kubernetes.io/audit: privileged
            pod-security.kubernetes.io/warn: privileged
        ---
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: local-path-provisioner-service-account
          namespace: local-path-storage
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: local-path-provisioner-role
          namespace: local-path-storage
        rules:
          - apiGroups: [""]
            resources: ["pods"]
            verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRole
        metadata:
          name: local-path-provisioner-role
        rules:
          - apiGroups: [""]
            resources: ["nodes", "persistentvolumeclaims", "configmaps", "pods", "pods/log"]
            verbs: ["get", "list", "watch"]
          - apiGroups: [""]
            resources: ["persistentvolumes"]
            verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]
          - apiGroups: [""]
            resources: ["events"]
            verbs: ["create", "patch"]
          - apiGroups: ["storage.k8s.io"]
            resources: ["storageclasses"]
            verbs: ["get", "list", "watch"]
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: local-path-provisioner-bind
          namespace: local-path-storage
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: Role
          name: local-path-provisioner-role
        subjects:
          - kind: ServiceAccount
            name: local-path-provisioner-service-account
            namespace: local-path-storage
        ---
        apiVersion: rbac.authorization.k8s.io/v1
        kind: ClusterRoleBinding
        metadata:
          name: local-path-provisioner-bind
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: ClusterRole
          name: local-path-provisioner-role
        subjects:
          - kind: ServiceAccount
            name: local-path-provisioner-service-account
            namespace: local-path-storage
        ---
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: local-path-provisioner
          namespace: local-path-storage
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: local-path-provisioner
          template:
            metadata:
              labels:
                app: local-path-provisioner
            spec:
              serviceAccountName: local-path-provisioner-service-account
              containers:
                - name: local-path-provisioner
                  image: rancher/local-path-provisioner:v0.0.31
                  imagePullPolicy: IfNotPresent
                  command:
                    - local-path-provisioner
                    - --debug
                    - start
                    - --config
                    - /etc/config/config.json
                  volumeMounts:
                    - name: config-volume
                      mountPath: /etc/config/
                  env:
                    - name: POD_NAMESPACE
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.namespace
                    - name: CONFIG_MOUNT_PATH
                      value: /etc/config/
              volumes:
                - name: config-volume
                  configMap:
                    name: local-path-config
        ---
        apiVersion: storage.k8s.io/v1
        kind: StorageClass
        metadata:
          name: local-path
          annotations:
            storageclass.kubernetes.io/is-default-class: "true"
        provisioner: rancher.io/local-path
        volumeBindingMode: WaitForFirstConsumer
        reclaimPolicy: Delete
        ---
        kind: ConfigMap
        apiVersion: v1
        metadata:
          name: local-path-config
          namespace: local-path-storage
        data:
          config.json: |-
            {
                    "nodePathMap":[
                    {
                            "node":"DEFAULT_PATH_FOR_NON_LISTED_NODES",
                            "paths":["/var/local-path-provisioner"]
                    }
                    ]
            }
          setup: |-
            #!/bin/sh
            set -eu
            mkdir -m 0777 -p "$VOL_DIR"
          teardown: |-
            #!/bin/sh
            set -eu
            rm -rf "$VOL_DIR"
          helperPod.yaml: |-
            apiVersion: v1
            kind: Pod
            metadata:
              name: helper-pod
            spec:
              priorityClassName: system-node-critical
              tolerations:
                - key: node.kubernetes.io/disk-pressure
                  operator: Exists
                  effect: NoSchedule
              containers:
              - name: helper-pod
                image: busybox
                imagePullPolicy: IfNotPresent

    # Install NFS server provisioner chart (with StorageClass for RWX volumes).
    # Based on the official Helm chart, but delivered as a HelmChart CRD to be automatically installed by the 
    # helm-controller we added above. N
    - name: nfs-server-provisioner
      contents: |-
        apiVersion: v1
        kind: Namespace
        metadata:
          name: nfs-storage
          labels:
            pod-security.kubernetes.io/enforce: privileged
            pod-security.kubernetes.io/audit: privileged
            pod-security.kubernetes.io/warn: privileged
        ---
        apiVersion: helm.cattle.io/v1
        kind: HelmChart
        metadata:
          name: nfs-server-provisioner
          namespace: kube-system
        spec:
          repo: https://kubernetes-sigs.github.io/nfs-ganesha-server-and-external-provisioner/
          chart: nfs-server-provisioner
          version: "1.8.0"
          targetNamespace: nfs-storage
          createNamespace: false
          valuesContent: |-
            # Back the NFS export with a local-path PVC.
            # The local-path PV is ReadWriteOnce (RWO), only the single server pod mounts it. The client workloads
            # reach it through a PV of type ReadWriteMany (RWX) over NFS.
            persistence:
              enabled: true
              storageClass: local-path
              accessMode: ReadWriteOnce
              size: 10Gi
            storageClass:
              create: true
              name: nfs
              defaultClass: false
              reclaimPolicy: Delete
              allowVolumeExpansion: true
              mountOptions:
                - vers=3
                - retrans=2
                - timeo=30
            # Capabilities Ganesha needs to serve the NFS export.
            securityContext:
              capabilities:
                add:
                  - DAC_READ_SEARCH
                  - SYS_RESOURCE

    # Installs metrics-server Helm chart to provide K8s metrics.
    # Notice that Talos' kubelet serves self-signed certs, so we skip TLS verification in the chart values, but in
    # a production cluster you would want to enable kubelet `rotate-server-certificates` and have them signed by the
    # cluster CA. We also prefer the node's InternalIP for scraping, since Talos nodes advertise it and it avoids 
    # potential issues with hostname resolution.
    - name: metrics-server
      contents: |-
        apiVersion: helm.cattle.io/v1
        kind: HelmChart
        metadata:
          name: metrics-server
          namespace: kube-system
        spec:
          repo: https://kubernetes-sigs.github.io/metrics-server/
          chart: metrics-server
          version: "3.13.1"
          targetNamespace: kube-system
          createNamespace: false
          valuesContent: |-
            args:
              - --kubelet-insecure-tls
              - --kubelet-preferred-address-types=InternalIP,Hostname,ExternalIP
