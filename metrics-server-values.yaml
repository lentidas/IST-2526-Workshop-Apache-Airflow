# metrics-server Helm values — workshop demo (HEIG-VD IST)
# Chart: metrics-server/metrics-server
# Provides `kubectl top` and live CPU/memory columns in k9s.
#
# Install:
#   helm repo add metrics-server https://kubernetes-sigs.github.io/metrics-server/
#   helm repo update metrics-server
#   helm upgrade --install metrics-server metrics-server/metrics-server \
#     -n kube-system -f metrics-server-values.yaml

# Talos kubelet serving certificates are self-signed (not signed by the cluster
# CA) unless rotate-server-certificates is enabled, so metrics-server's TLS
# verification of the kubelet would fail with an x509 error. Skip that
# verification — acceptable for a demo cluster, NOT for production.
args:
  - --kubelet-insecure-tls
  # Prefer the node's InternalIP for scraping (Talos nodes advertise it).
  - --kubelet-preferred-address-types=InternalIP,Hostname,ExternalIP
